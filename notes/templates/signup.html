{% extends 'navigation.html'%}
{% load static %}
{% block body %}

{% if error == "no" %}
     <script>
	   alert('Signup Successfull');
	   window.location=('{% url 'login' %}');
     </script>
{% endif %}

{% if error == "yes" %}
     <script>
	    alert('Something went wrong, Try Again');
     </script>
{% endif %}

<section class="signup" id="signup">
<h1 class="heading reveal">Create <span>Account</span></h1>
<p class="sub-heading reveal" style="transition-delay: 0.15s;">Join our community and start sharing notes with fellow students.</p>

<div class="row">
    <form method="post" class="reveal-left">
        {% csrf_token %}

        <div class="input-group half">
            <i class="fas fa-user input-icon"></i>
            <input type="text" placeholder="First Name" class="box" name="firstname" required>
        </div>

        <div class="input-group half">
            <i class="fas fa-user input-icon"></i>
            <input type="text" placeholder="Last Name" class="box" name="lastname" required>
        </div>

        <div class="input-group">
            <i class="fas fa-phone input-icon"></i>
            <input type="number" placeholder="Contact Number" class="box" name="contact" required>
        </div>

        <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" placeholder="Email Address" class="box" name="emailid" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" placeholder="Password" class="box" name="password" required>
        </div>

        <div class="input-group half">
            <i class="fas fa-book input-icon"></i>
            <select name="branch" class="box">
                <option value="">Select Branch</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Civil">Civil</option>
                <option value="Electronics">Electronics</option>
                <option value="Electric">Electric</option>
                <option value="IT">IT</option>
            </select>
        </div>

        <div class="input-group half">
            <i class="fas fa-user-tag input-icon"></i>
            <select name="role" class="box">
                <option value="">Select Role</option>
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
            </select>
        </div>

        <button type="submit" class="btn">Create Account <i class="fas fa-user-plus"></i></button>
    </form>

    <div class="image reveal-right">
        <img src="{% static 'images/taking-notes-amico.png' %}" alt="">
    </div>
</div>

</section>
{% endblock %}
